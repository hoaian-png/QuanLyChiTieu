<!DOCTYPE html><html class="dark" lang="vi" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Đăng nhập - Minh Bạch Finance</title>

                        "secondary-container": "#ec6a06",
                        "primary-fixed": "#6ffbbe",
                        "on-secondary-fixed": "#341100",
                        "on-surface": "#dae2fd",
                        "on-tertiary-container": "#003e55",
                        "tertiary-container": "#19aee8",

                    "borderRadius": {
                        "DEFAULT": "0.25rem",

                        "full": "9999px"

                    "spacing": {
                        "xl": "64px",
                        "base": "8px",
                        "gutter": "24px",
                        "container-max": "1280px",
                        "xs": "4px",

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-background text-on-background min-h-screen flex items-center justify-center p-gutter">
<div class="w-full max-w-md bg-surface-container-low border border-surface-variant rounded-xl p-md shadow-2xl relative overflow-hidden">
<!-- Subtle Glow Effect -->
<div class="absolute -top-[100px] -right-[100px] w-64 h-64 bg-primary rounded-full blur-[100px] opacity-10 pointer-events-none"></div>
<!-- Header -->
<div class="text-center mb-lg relative z-10">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-surface-container-highest border border-surface-variant mb-sm shadow-[0_0_15px_rgba(78,222,163,0.1)]">
<span class="material-symbols-outlined text-primary text-3xl" data-icon="account_balance">account_balance</span>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-xs">Quản Lý Chi Tiéu</h1>
<p class="font-body-md text-body-md text-on-surface-variant">Chào mừng trở lại</p>
</div>
<!-- Form -->
<form class="space-y-sm relative z-10">
<!-- Email Input -->
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="mail">mail</span>
</div>
<input class="w-full bg-[#111827] border border-surface-variant rounded-lg pl-10 pr-sm py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary placeholder:text-on-surface-variant transition-colors" placeholder="Email hoặc Số điện thoại" type="text">
</div>
<!-- Password Input -->
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-sm flex items-center pointer-events-none">
<span class="material-symbols-outlined text-on-surface-variant" data-icon="lock">lock</span>
</div>
<input class="w-full bg-[#111827] border border-surface-variant rounded-lg pl-10 pr-10 py-sm font-body-md text-body-md text-on-surface focus:outline-none focus:border-primary focus:ring-1 focus:ring-primary placeholder:text-on-surface-variant transition-colors" placeholder="Mật khẩu" type="password">
<button class="absolute inset-y-0 right-0 pr-sm flex items-center text-on-surface-variant hover:text-on-surface transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility_off">visibility_off</span>
</button>
</div>
<!-- Forgot Password -->
<div class="flex justify-end pt-xs pb-sm">
<a class="font-label-sm text-label-sm text-primary hover:text-primary-fixed transition-colors" href="#">Quên mật khẩu?</a>
</div>
<!-- Submit Button -->
<button class="w-full bg-primary-container text-on-primary-container hover:bg-primary hover:text-on-primary font-headline-md text-headline-md rounded-lg py-sm transition-all duration-200 shadow-[0_4px_14px_0_rgba(16,185,129,0.2)] hover:shadow-[0_6px_20px_rgba(16,185,129,0.3)] hover:-translate-y-0.5" type="submit">
                Đăng nhập
            </button>
</form>
<!-- Divider -->

<!-- Social Login -->

<!-- Footer -->
<div class="text-center relative z-10">
<p class="font-body-md text-body-md text-on-surface-variant">
                Chưa có tài khoản? <a class="text-primary hover:text-primary-fixed transition-colors font-medium" href="#">Đăng ký ngay</a>
</p>
</div>
</div>


</body></html>
